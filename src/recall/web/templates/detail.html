{% extends "base.html" %}
{% block content %}
<section class="card stack">
  <a href="/">Back</a>
  <h1>Note #{{ note.id }}</h1>
  <p class="eyebrow">Original</p>
  <p>{{ note.original_note }}</p>
  <p class="eyebrow">Elaboration</p>
  <p>{{ note.elaborated_note or "Waiting for enrichment." }}</p>
  <p class="eyebrow">Tags</p>
  <p>{{ note.tags or "No tags yet." }}</p>
  <p>Status: {{ note.enrichment_status }}</p>
  <div class="row">
    <a href="/notes/{{ note.id }}/edit">Edit</a>
    <form method="post" action="/notes/{{ note.id }}/delete">
      <button type="submit">Delete</button>
    </form>
  </div>
</section>
{% endblock %}
