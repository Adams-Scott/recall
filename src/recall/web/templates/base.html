<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="icon" type="image/png" href="/static/icon.png" />
    <link rel="apple-touch-icon" href="/static/icon.png" />
    <link rel="stylesheet" href="/static/styles.css" />
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <nav class="top-nav card">
        <a class="brand" href="/">
          <img class="app-icon" src="/static/icon.png" alt="Recall icon" width="28" height="28" />
          <span>{{ app_name }}</span>
        </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="top-links">
          <span class="menu-toggle-lines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
          <span class="menu-toggle-label">Menu</span>
        </button>
        <div id="top-links" class="top-links" hidden>
          <a href="/">Home</a>
          <a href="/tags">Tags</a>
          <a href="/context">Context</a>
          <a href="/worker-health">Health</a>
        </div>
        <form class="top-add-note" method="get" action="/notes/new">
          <button type="submit">Add note</button>
        </form>
      </nav>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
