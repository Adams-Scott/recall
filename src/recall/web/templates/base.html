<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="icon" type="image/png" href="/static/icon.png" />
    <link rel="apple-touch-icon" href="/static/icon.png" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <nav class="top-nav card">
        <a class="brand" href="/">
          <img class="app-icon" src="/static/icon.png" alt="Recall icon" width="28" height="28" />
          <span>{{ app_name }}</span>
        </a>
        <div class="top-links">
          <a href="/">Home</a>
          <a href="/#search-panel">Search</a>
          <a href="/worker-health">Worker health</a>
        </div>
      </nav>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
